name: port-ci

# Least-privilege: this job only reads the repo and runs tests; it needs no write scopes.
permissions:
  contents: read

# Port-only reproducibility gate: build the C++/libtorch port + ISO_C ABI and run the
# full ctest suite from the public repo ALONE (no WRF/KIM-meso host). The macOS/arm64
# bitwise host parity is a separate, platform-pinned property (see ENVIRONMENT.md) and is
# NOT what this checks — the ctest suite is f64-deterministic / tolerance / ABI-mechanics,
# so it is portable to Linux. This exists so "ctest is green" is CI-verified, not just a
# claim in the README. After ctest it also runs the oracle↔C++ forward-parity REGRESSION
# BOUND (oracle/tests/test_cpp_parity) — a worst_rel < 1e-6 check of the f32 C++ dump vs the
# f64 Python oracle (not strict equality; the f32 mirror carries O(1e-8) roundoff, a real bug
# jumps orders of magnitude). It needs the compiled binary this job just built, so an oracle
# refactor that drifts from the C++ port is caught here (the pure-Python oracle suite itself
# is gated separately by oracle-ci).

on:
  push:
    branches: [main]
    paths:
      - 'libtorch/**'
      - '.github/workflows/**'
      # docs that carry the "ctest is green 17/17" claim — re-run so the badge
      # stays tied to the current commit, not just the last libtorch/** change.
      - 'README.md'
      - 'ENVIRONMENT.md'
      - 'docs/HOST_INTEGRATION.md'
      # oracle source: rebuild + re-run the oracle↔C++ forward-parity test (needs the built
      # binary), so an oracle refactor that drifts from the C++ port is caught here.
      - 'oracle/kdm6/**'
      # the parity tests this job now runs + the conftest that puts `kdm6` on sys.path for them —
      # trigger when any changes too (they are direct inputs to the parity run).
      - 'oracle/tests/test_cpp_parity.py'
      - 'oracle/tests/test_cpp_conservative_interface_parity.py'
      - 'oracle/conftest.py'
      # the G3.3-M kill gate now runs in this job — trigger on its inputs (overlay
      # TUs / build script / gate / mutant generator + the self-check reader and
      # its harness deps) so a change to them re-runs the continuous gate.
      - 'harness/g33_overlay/**'
      - 'harness/g33_selfcheck.py'
      - 'harness/g33_run_env.py'
      - 'harness/g33_dump.py'
      - 'harness/g33_derived.py'
      - 'harness/g33_expectation.py'
  pull_request:
    branches: [main]
    paths:
      - 'libtorch/**'
      - '.github/workflows/**'
      # docs that carry the "ctest is green 17/17" claim — re-run so the badge
      # stays tied to the current commit, not just the last libtorch/** change.
      - 'README.md'
      - 'ENVIRONMENT.md'
      - 'docs/HOST_INTEGRATION.md'
      # oracle source: rebuild + re-run the oracle↔C++ forward-parity test (needs the built
      # binary), so an oracle refactor that drifts from the C++ port is caught here.
      - 'oracle/kdm6/**'
      # the parity tests this job now runs + the conftest that puts `kdm6` on sys.path for them —
      # trigger when any changes too (they are direct inputs to the parity run).
      - 'oracle/tests/test_cpp_parity.py'
      - 'oracle/tests/test_cpp_conservative_interface_parity.py'
      - 'oracle/conftest.py'
      # the G3.3-M kill gate now runs in this job — trigger on its inputs (overlay
      # TUs / build script / gate / mutant generator + the self-check reader and
      # its harness deps) so a change to them re-runs the continuous gate.
      - 'harness/g33_overlay/**'
      - 'harness/g33_selfcheck.py'
      - 'harness/g33_run_env.py'
      - 'harness/g33_dump.py'
      - 'harness/g33_derived.py'
      - 'harness/g33_expectation.py'
  workflow_dispatch:

jobs:
  build-and-test:
    name: build + ctest (ubuntu, libtorch CPU)
    # Pinned image (not ubuntu-latest) so a future runner bump can't silently change the
    # compiler/libc under the port. Actions stay on major tags (v4/v5) — the "Record
    # toolchain versions" step logs cmake/g++/gfortran/torch so any drift is visible in the log.
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Python version is NOT the ENVIRONMENT.md reference (3.9.10) on purpose: this job is a
      # PORTABLE port-only ctest gate, not a reproduction of the macOS bitwise-parity host env.
      # Only torch is pinned to the reference (2.8.0); Python/OS/compiler are deliberately a
      # second, different toolchain (Ubuntu/gcc) so the suite is exercised beyond clang/macOS.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gfortran + PyTorch (CPU)
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran
          python -m pip install --upgrade pip
          # CPU-only wheel — the port is CPU/float32 for parity; no CUDA path is claimed.
          # Pinned to the ENVIRONMENT.md reference version so CI validates that toolchain,
          # not whatever the latest wheel happens to be.
          pip install "torch==2.8.0" --index-url https://download.pytorch.org/whl/cpu
          # numpy is NOT a hard torch>=2.8 dependency, but the G3.3-M self-check
          # reader needs it for the raw-bit replay — install it explicitly.
          pip install numpy

      - name: Record toolchain versions
        run: |
          cmake --version | head -1
          g++ --version | head -1
          gfortran --version | head -1
          python -c 'import torch; print("torch", torch.__version__)'
          pip --version   # installer version (deps are pinned; pip itself is not)

      # PR1-A dual-gate: the representative CI build is the SHIPPED config
      # (KDM6_ENABLE_TEST_HOOKS=OFF) — full build + install + all 17 CTest +
      # parity + a seam-absence check on the built library. Only AFTER that does
      # a second pass reconfigure the SAME tree ON to run the fault-path test
      # through the real shared library, so the production-equivalent artifact
      # is what CI validates and the "no test seam in the shipped dylib"
      # property is a continuous gate, not a one-off manual check.
      - name: Configure (CMake, SHIPPED config — test hooks OFF)
        run: |
          cd libtorch && mkdir -p build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$(python -c 'import torch, os; print(os.path.dirname(torch.__file__))')" \
            -DCMAKE_INSTALL_PREFIX=../install \
            -DKDM6_ENABLE_TEST_HOOKS=OFF \
            -DCMAKE_CXX_FLAGS=-DKDM6_SUBSTEP_DUMP

      - name: Build (shipped)
        run: cmake --build libtorch/build -j

      - name: Install (file-copy)
        run: cmake --install libtorch/build

      - name: ctest (shipped, all 17)
        run: ctest --test-dir libtorch/build --output-on-failure

      # G3.3-M op-provenance kill gate: build the instrumented self-check driver
      # + 5 mutants against the libkdm6.a this job just built, and require
      # real=PASS with every mutant killed at its predicted site. This makes the
      # op-provenance evidence a CONTINUOUS CI gate, not a local transcript. Runs
      # on the SHIPPED (test-hooks OFF) config, BEFORE the reconfigure-ON below
      # that rewrites flags.make. numpy (the fail-closed reader's only dep beyond
      # the stdlib) comes in with torch, installed above.
      - name: G3.3-M self-check + 5-mutant kill gate
        run: bash harness/g33_overlay/selfcheck_gate.sh

      - name: Assert the test fault seam is ABSENT from the shipped library
        run: |
          LIB=$(ls libtorch/build/libkdm6_c.so* libtorch/build/libkdm6_c.dylib 2>/dev/null | head -1)
          echo "checking $LIB"
          if strings "$LIB" | grep -Fq 'KDM6_TEST_FORCE_THREAD_CONFIG_FAIL'; then
            echo "FAIL: test fault seam leaked into the shipped library"; exit 1
          fi
          echo "OK: no test fault seam in the shipped library"

      # PR3: the shipped dylib must export EXACTLY the 9 C ABI functions and leak
      # ZERO internal (kdm6::/libtorch/std) symbols. Uses readelf on Linux with
      # the version-suffix normalization the checker handles (see the script).
      - name: Assert exported symbol surface is exactly the 9 C ABI functions
        run: |
          LIB=$(ls libtorch/build/libkdm6_c.so* 2>/dev/null | head -1)
          python libtorch/tests/check_c_abi_exports.py "$LIB"

      # PR1-B: the shipped library must NOT inject KMP_DUPLICATE_LIB_OK. Fresh-process
      # contract: an UNSET value stays unset; an explicit FALSE/TRUE is preserved; the
      # 9 C ABI symbols resolve and the ABI version is 2.
      - name: Assert KMP_DUPLICATE_LIB_OK is caller-owned (PR1-B)
        run: |
          LIB=$(ls libtorch/build/libkdm6_c.so.2.0.0 libtorch/build/libkdm6_c.so* 2>/dev/null | head -1)
          export LD_LIBRARY_PATH="$(python -c 'import torch,os;print(os.path.join(os.path.dirname(torch.__file__),"lib"))'):$LD_LIBRARY_PATH"
          python libtorch/tests/check_kmp_duplicate_env.py "$LIB"

      # PR3-B: SOVERSION 2 / VERSION 2.0.0 must produce the SONAME libkdm6_c.so.2
      # and the .so -> .so.2 -> .so.2.0.0 symlink chain, so a consumer links the
      # major-versioned soname (a future incompatible v3 is not picked up silently).
      - name: Assert SONAME + versioned symlink chain (PR3-B)
        run: |
          cd libtorch/install/lib
          ls -l libkdm6_c.so*
          test -f libkdm6_c.so.2.0.0 || { echo "FAIL: missing real libkdm6_c.so.2.0.0"; exit 1; }
          test -L libkdm6_c.so.2     || { echo "FAIL: missing SONAME symlink libkdm6_c.so.2"; exit 1; }
          test -L libkdm6_c.so       || { echo "FAIL: missing dev symlink libkdm6_c.so"; exit 1; }
          SON=$(objdump -p libkdm6_c.so.2.0.0 | awk '/SONAME/{print $2}')
          echo "SONAME: $SON"
          test "$SON" = "libkdm6_c.so.2" || { echo "FAIL: SONAME '$SON' != libkdm6_c.so.2"; exit 1; }
          echo "OK: SONAME libkdm6_c.so.2, chain .so -> .so.2 -> .so.2.0.0"

      - name: Reconfigure ON + run the fault-path test through the shared lib
        run: |
          cd libtorch/build
          cmake .. -DKDM6_ENABLE_TEST_HOOKS=ON
          cmake --build . --target kdm6_c test_c_abi -j
          ctest -R '^c_abi$' -V --output-on-failure

      # oracle↔C++ forward-parity regression bound: the f64 Python oracle vs this built C++
      # port (worst_rel < 1e-6, not strict equality — the f32 mirror carries O(1e-8) roundoff).
      # It lives here (not in oracle-ci) because it needs the compiled test_autograd_endtoend
      # binary the build step produced; torch is already installed for the C++ build.
      - name: oracle↔C++ parity regression bounds (test_cpp_parity + conservative-interface)
        run: |
          # pinned to the last green combo (torch 2.8.0 is already installed above)
          pip install "numpy==2.4.6" "pytest==9.1.1"
          # log them too — the "Record toolchain versions" step above runs before this install
          python -c 'import numpy, pytest; print("numpy", numpy.__version__, "| pytest", pytest.__version__)'
          # test_cpp_conservative_interface_parity drives the dump_conservative_interface
          # binary built above against oracle/kdm6/sed_conservative.py (the freeze-lift's
          # authoritative reference): direct substeps fp64 rtol<=1e-10 (measured bitwise),
          # controlled f32 (measured bitwise), full-step regression bound.
          cd oracle && python -m pytest tests/test_cpp_parity.py tests/test_cpp_conservative_interface_parity.py -rs -q

  # PR3: the symbol-visibility / export-allowlist work is platform-specific
  # (macOS exported_symbols_list vs Linux --version-script), so the export
  # surface must be gated on BOTH. This macOS/arm64 job mirrors the shipped
  # dual-gate + the reference-adjacent host checks (arch, install-name, a
  # fresh-process ctypes load). The owner-environment mp37↔mp137 bitwise parity
  # remains a separate merge gate (docs/PR3_VISIBILITY_DESIGN.md §9).
  build-and-test-macos:
    name: build + symbol surface + smoke (macOS arm64, libtorch CPU)
    runs-on: macos-14
    # The full libtorch C++ build runs ~43-45 min on macos-14 hosted runners
    # (last green was 42.5 min); a 45-min cap flakes as timeout-cancelled. 60 gives margin.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install gfortran + PyTorch (macOS arm64)
        run: |
          brew install gcc          # provides gfortran (not preinstalled on the runner)
          python -m pip install --upgrade pip
          # macOS arm64 default wheel is CPU-only; pin to the ENVIRONMENT.md reference.
          pip install "torch==2.8.0"

      - name: Record toolchain versions
        run: |
          cmake --version | head -1
          clang --version | head -1
          gfortran --version | head -1
          python -c 'import torch; print("torch", torch.__version__)'

      - name: Configure (CMake, SHIPPED config — test hooks OFF, Release)
        run: |
          cd libtorch && mkdir -p build && cd build
          cmake .. \
            -DCMAKE_PREFIX_PATH="$(python -c 'import torch, os; print(os.path.dirname(torch.__file__))')" \
            -DCMAKE_INSTALL_PREFIX=../install \
            -DCMAKE_BUILD_TYPE=Release \
            -DKDM6_ENABLE_TEST_HOOKS=OFF \
            -DCMAKE_CXX_FLAGS=-DKDM6_SUBSTEP_DUMP

      - name: Build (shipped)
        run: cmake --build libtorch/build -j

      - name: Install (file-copy)
        run: cmake --install libtorch/build

      - name: ctest (shipped, all 17)
        run: ctest --test-dir libtorch/build --output-on-failure

      - name: Assert arch (arm64) + fault seam ABSENT + install-name
        run: |
          LIB=libtorch/build/libkdm6_c.dylib
          file "$LIB" | grep -q arm64 || { echo "FAIL: not arm64"; exit 1; }
          if strings "$LIB" | grep -Fq 'KDM6_TEST_FORCE_THREAD_CONFIG_FAIL'; then
            echo "FAIL: test fault seam leaked into the shipped library"; exit 1
          fi
          echo "install-name:"; otool -D "$LIB"
          echo "linked libs:";  otool -L "$LIB" | head -5
          echo "OK: arm64, no seam"

      - name: Assert exported symbol surface is exactly the 9 C ABI functions
        run: python libtorch/tests/check_c_abi_exports.py libtorch/build/libkdm6_c.dylib

      - name: Fresh-process ctypes load resolves all 9
        working-directory: libtorch/build
        run: |
          python -c "import ctypes; lib=ctypes.CDLL('./libkdm6_c.dylib'); [getattr(lib,s) for s in 'kdm6_step_c kdm6_step_ad_c kdm6_step_v2_c kdm6_get_abi_version_c kdm6_step_v2_args_size_c kdm6_handle_vjp_c kdm6_handle_jvp_c kdm6_handle_close_c kdm6_handle_closep_c'.split()]; print('OK all 9 resolve, abi =', lib.kdm6_get_abi_version_c())"

      # PR1-B: the shipped library must NOT inject KMP_DUPLICATE_LIB_OK. Fresh-process
      # contract: an UNSET value stays unset; an explicit FALSE/TRUE is preserved.
      - name: Assert KMP_DUPLICATE_LIB_OK is caller-owned (PR1-B)
        run: python libtorch/tests/check_kmp_duplicate_env.py libtorch/build/libkdm6_c.dylib

      # PR3-B: SOVERSION 2 / VERSION 2.0.0 must produce the versioned install-name
      # @rpath/libkdm6_c.2.dylib and the .dylib -> .2.dylib -> .2.0.0.dylib chain,
      # so the host links the unversioned dev symlink but loads the versioned lib.
      - name: Assert versioned install-name + symlink chain (PR3-B)
        run: |
          cd libtorch/install/lib
          ls -l libkdm6_c*.dylib
          test -f libkdm6_c.2.0.0.dylib || { echo "FAIL: missing real libkdm6_c.2.0.0.dylib"; exit 1; }
          test -L libkdm6_c.2.dylib     || { echo "FAIL: missing compat symlink libkdm6_c.2.dylib"; exit 1; }
          test -L libkdm6_c.dylib       || { echo "FAIL: missing dev symlink libkdm6_c.dylib"; exit 1; }
          IN=$(otool -D libkdm6_c.2.0.0.dylib | tail -1)
          echo "install_name: $IN"
          test "$IN" = "@rpath/libkdm6_c.2.dylib" || { echo "FAIL: install_name '$IN' != @rpath/libkdm6_c.2.dylib"; exit 1; }
          echo "OK: versioned install-name @rpath/libkdm6_c.2.dylib, chain .dylib -> .2.dylib -> .2.0.0.dylib"

      - name: Reconfigure ON + run the fault-path test through the shared lib
        run: |
          cd libtorch/build
          cmake .. -DKDM6_ENABLE_TEST_HOOKS=ON
          cmake --build . --target kdm6_c test_c_abi -j
          ctest -R '^c_abi$' -V --output-on-failure
