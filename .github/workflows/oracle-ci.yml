name: oracle-ci

# Gates the PORTABLE, pure-Python part of the oracle suite (oracle/kdm6 — the f64
# algorithm-definition / parity reference) so an oracle refactor can't drift its values
# without CI catching it. On this Python-only runner ~442 tests run; the remainder SKIP by
# design and are gated elsewhere (so this job does NOT claim the full 495-test run):
#   - test_cpp_parity (oracle↔C++ forward parity) needs the built C++ port — it is gated by
#     port-ci (ci.yml), which builds libtorch and runs that test after ctest.
#   - test_rttov_runner needs a local RTTOV reference dataset not shipped in this public repo.
# `-rs` prints the skip reasons so the pass/skip split is visible in the log. torch pinned to
# the ENVIRONMENT.md reference (2.8.0); rttov_bridge is pure Python (no RTTOV .so).

on:
  push:
    branches: [main]
    paths:
      - 'oracle/**'
      - '.github/workflows/oracle-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'oracle/**'
      - '.github/workflows/oracle-ci.yml'
  workflow_dispatch:

jobs:
  oracle-pytest:
    name: oracle pytest (f64 reference)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install torch (CPU, pinned) + numpy + pytest
        run: |
          python -m pip install --upgrade pip
          pip install "torch==2.8.0" --index-url https://download.pytorch.org/whl/cpu
          pip install numpy pytest

      - name: Record versions
        run: |
          python -c 'import sys, torch, numpy; print("python", sys.version.split()[0], "| torch", torch.__version__, "| numpy", numpy.__version__)'

      - name: pytest (oracle/, pure-Python subset)
        run: cd oracle && python -m pytest -rs -q
