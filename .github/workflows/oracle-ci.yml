name: oracle-ci

# Least-privilege: read-only; this job only runs the oracle pytest.
permissions:
  contents: read

# Gates the PORTABLE, pure-Python part of the oracle suite (oracle/kdm6 — the f64
# algorithm-definition / parity reference) so an oracle refactor can't drift its values
# without CI catching it. On this Python-only runner the pure-Python subset runs; the remainder SKIP by
# design and are gated elsewhere (so this job does NOT claim the full suite):
#   - test_cpp_parity (oracle↔C++ forward parity) and test_cpp_conservative_interface_parity
#     (conservative-interface oracle cross-check) need the built C++ port — they are gated by
#     port-ci (ci.yml), which builds libtorch and runs them after ctest.
#   - test_rttov_runner needs a local RTTOV reference dataset not shipped in this public repo.
# `-rs` prints the skip reasons so the pass/skip split is visible in the log. torch pinned to
# the ENVIRONMENT.md reference (2.8.0); rttov_bridge is pure Python (no RTTOV .so).

on:
  push:
    branches: [main]
    paths:
      - 'oracle/**'
      - '.github/workflows/oracle-ci.yml'
  # No paths filter on pull_request: "oracle pytest (f64 reference)" is a
  # REQUIRED status check in the main ruleset, so it must REPORT on every PR
  # to main. Path-filtering it (oracle/** only) left non-oracle PRs blocked
  # forever — GitHub waits for a required context that never runs, and a
  # manual workflow_dispatch run is not credited to the PR merge-box. The job
  # is a ~1-2 min pure-Python pytest; running it on all PRs is cheap and makes
  # the gate always satisfiable. (push stays oracle-scoped — post-merge only.)
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  oracle-pytest:
    name: oracle pytest (f64 reference)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install torch (CPU, pinned) + numpy + pytest
        run: |
          python -m pip install --upgrade pip
          pip install "torch==2.8.0" --index-url https://download.pytorch.org/whl/cpu
          # numpy/pytest pinned to the last green combo (with torch 2.8.0 / py3.11) so the
          # numeric suite is reproducible — a numpy major bump could shift float behavior.
          pip install "numpy==2.4.6" "pytest==9.1.1"

      - name: Record versions
        run: |
          python -c 'import sys, torch, numpy, pytest; print("python", sys.version.split()[0], "| torch", torch.__version__, "| numpy", numpy.__version__, "| pytest", pytest.__version__)'
          pip --version   # installer version (deps are pinned; pip itself is not)

      - name: pytest (oracle/, pure-Python subset)
        run: cd oracle && python -m pytest -rs -q
